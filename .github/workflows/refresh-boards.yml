# Tier4 게시판(공지·뉴스) live_cache 갱신 — 6시간마다.
# 활성화: 이 repo를 GitHub에 푸시 + Settings>Secrets에 ENV_LOCAL(=.env.local 전체 내용) 등록.
# 수동 실행: Actions 탭 > Refresh board cache > Run workflow.
name: Refresh board cache (Tier4)

on:
  schedule:
    - cron: '0 */6 * * *' # 매 6시간 (UTC)
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # gspa·gsct 등 dynamic 게시판 렌더용 (headless chromium)
      - run: npx playwright install --with-deps chromium
      # .env.local 시크릿 복원(기존 npm 스크립트가 --env-file=.env.local 사용)
      - run: printf '%s' "${{ secrets.ENV_LOCAL }}" > .env.local
      - run: npm run crawl:colleges -- --phase 4 --tier 4
