 총장추천위원회 위원 추천 절차 가동"},{"x":-0.1054848806383025,"y":0.06548000406234472,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"재정거버넌스","title":"재정거버넌스","preview":"재정거버넌스 # 재정거버넌스  > **카테고리**: 재정  ## 개요  효율적인 재정운용 및 전문화된 재정거버넌스 구축을 위해 CFO 및 재정전략실 중심으로 재정기능을 개선하는 방안에 대한 논의. 2023년 제5차 이사회에서 최초 논의되었으나 의결 없이 논의에 그침 ["},{"x":0.05081157864672416,"y":0.07294993949341017,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"제도혁신위원회","title":"제도혁신위원회","preview":"제도혁신위원회 # 제도혁신위원회  > **카테고리**: 거버넌스  ## 개요  서울대학교 제도 개혁을 추진하기 위해 신설된 위원회. 초기 명칭은 \"신뢰기반혁신위원회\"로 논의되었으나 이사회 운영소위원회 논의를 거쳐 명칭·임기·목적을 재검토한 후 \"제도혁신위원회\"로 설립됨"},{"x":-0.12925939529000538,"y":0.1861495913124649,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"조직-개편","title":"조직 개편","preview":"조직 개편 # 조직 개편  > **카테고리**: 인사·제도  ## 개요  서울대학교 본부 조직 개편 내역. 2023년 제8차 이사회에서 2024.1.1.자 직제개편을 반영하는 학칙 개정을 의결하였으며, 2025년 제9차 이사회에서 국제협력본부를 국제처로 개편하는 안을 "},{"x":0.09563965916327136,"y":0.1980807947267474,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"첨단융합학부","title":"첨단융합학부","preview":"첨단융합학부 # 첨단융합학부  > **카테고리**: 학사  ## 개요  서울대학교 첨단융합학부의 신설(2023). 2024학년도 신설을 위해 학칙을 개정하고, 운영 세부 계획을 이사회에 보고함 [[2023-5차]] [[2023-7차]].  ## 주요 논의 흐름 (시계열"},{"x":0.11205833871868218,"y":0.1264139579798767,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"총장-선출","title":"총장 선출","preview":"총장 선출 # 총장 선출  > **카테고리**: 거버넌스 > **성격**: **총장 후보자가 반드시 확인해야 할 핵심 topic**  ## 개요 서울대학교 총장 선출과 관련한 이사회 차원의 논의. 이사회는 총장추천위원회 규정 개정(2023), 총장선출제도 개선 논의(2"},{"x":0.1811555139104176,"y":0.0007310790456581742,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"평창캠퍼스","title":"평창캠퍼스","preview":"평창캠퍼스 # 평창캠퍼스  > **카테고리**: 인프라  ## 개요  서울대학교 평창캠퍼스의 발전 계획. 2024년 하반기에 수학아카데미아 조성, 그린바이오 벤처 캠퍼스 조성, 그린바이오과학기술연구원(GBST) 비전 및 마스터플랜이 보고·의결됨 [[2024-6차]] ["},{"x":0.030749729181947662,"y":0.1756357257217167,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"학부대학","title":"학부대학","preview":"학부대학 # 학부대학  > **카테고리**: 학사  ## 개요  서울대학교 학부대학 설립 추진 및 조직 개편. 2024년 보고·논의를 거쳐 기초교육원을 폐지하고, 자유전공학부를 학부대학으로 이관하며, 공통핵심역량 중심의 교육조직으로 학부대학을 신설함 [[2024-1차]"},{"x":-0.008086713250485312,"y":0.08958624077840804,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"학칙-개정","title":"학칙 개정","preview":"학칙 개정 # 학칙 개정  > **카테고리**: 학사  ## 개요 서울대학교 학칙 일부개정 안건. 이사회에서 가장 빈번하게 다루어지는 반복 안건. 주로 **추인** 형태로 처리됨 (평의원회 심의 후 이사회 추인). 일부 중요 안건은 **심의·의결** 형태로 처리됨. 2"},{"x":-0.07839738579108835,"y":0.18907002235112536,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"정관개정","title":"정관 개정","preview":"정관 개정 # 정관 개정  > **카테고리**: 거버넌스  ## 개요  국립대학법인 서울대학교 정관 개정 논의. 이사회 구성을 법률과 동일하게 변경하는 안이 2023년부터 논의되었으나, 학내 의견 대립 끝에 2024년 제2차 이사회에서 [[권오현]] 이사장이 안건 상정"},{"x":0.11764134376811038,"y":0.12314500004581251,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"SNU-그랜드퀘스트","title":"SNU 그랜드퀘스트","preview":"SNU 그랜드퀘스트 # SNU 그랜드퀘스트  > **카테고리**: 연구  ## 개요  서울대학교가 미래 난제를 질문 중심으로 제시하여 도전적 연구문화를 조성하고 성과를 확산하는 사업. 2025년 예산 편성 방향에 포함되었고, 2026년 제1차 이사회에서 사업 추진계획이"},{"x":0.04261608859424533,"y":0.04166521604099014,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"ERP","title":"ERP 도입","preview":"ERP 도입 # ERP 도입  > **카테고리**: 연구·인프라  ## 개요  서울대학교 전사적 자원관리(ERP) 시스템 도입 사업. [[박원호]] 기획처장이 2023년 제3차 이사회에서 도입 사업의 주요내용, 기대효과, 추진 경과 및 향후 계획을 보고하였으며, 1단계"},{"x":-0.04214050027104513,"y":0.027412290426543,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"SNU홀딩스","title":"SNU홀딩스","preview":"SNU홀딩스 # SNU홀딩스  > **카테고리**: 재정  ## 개요  (주)에스엔유홀딩스(SNU Holdings corp.)의 현황. 2025년 제4차 이사회에서 설립 추진 배경, 법인 개요, 자회사 현황이 보고되었으며, 2026년 추가경정 예산에서 자본금 증자가 포"},{"x":0.14080259088626285,"y":0.05395132557165126,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"AI-대학원","title":"AI 대학원","preview":"AI 대학원 # AI 대학원  > **카테고리**: 연구  ## 개요  서울대학교 AI대학원 설립 계획. 2026년 제2차 이사회에서 설립요건, 교육목표 및 운영계획, 재적생 경과조치, 추진경과 및 향후 계획을 중심으로 보고됨 [[2026-2차]].  ## 주요 논의 "},{"x":-0.016213537577726103,"y":0.22039986696552388,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"감사-선임","title":"감사 선임","preview":"감사 선임 # 감사 선임  > **카테고리**: 거버넌스  ## 개요  국립대학법인 서울대학교 감사(상근·비상근)의 교체 과정. 2024년 상근감사 [[마광열]] → [[이영웅]], 2025년 비상근감사 [[고성천]] → [[이정희]]로 각각 선임되었음 [[2024-3"},{"x":0.051743843012274957,"y":-0.11811384378075286,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"교원-보수","title":"교원 보수","preview":"교원 보수 # 교원 보수  > **카테고리**: 인사  ## 개요  서울대학교 교원 보수 규정의 개정 및 성과중시 연봉제 도입. 2025년 상위 법령 개정에 따라 교원 보수 규정을 개정하고, 시행세칙 및 운영 지침을 제정하여 정년보장교원에게 연봉제를 적용함 [[2025"},{"x":0.0713276995482275,"y":0.12320890455170226,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"대학운영계획","title":"대학운영계획","preview":"대학운영계획 # 대학운영계획  > **카테고리**: 제도  ## 개요  국립대학법인법 제32조에 따라 매년 수립되는 연차별 대학운영계획. 4년 단위 성과목표에 기반하여 교육·연구·사회공헌·인프라 분야별 실행과제를 이사회에서 심의·의결함 [[2023-2차]] [[2024"},{"x":0.12437030104522477,"y":0.0814516011016315,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"대학운영성과목표","title":"대학운영성과목표","preview":"대학운영성과목표 # 대학운영성과목표  > **카테고리**: 인사·제도  ## 개요  「국립대학법인 서울대학교 설립·운영에 관한 법률」 제32조에 따라 4년 단위로 수립하는 대학운영성과목표. 제4기('24~'27) 성과목표 수립 과정이 2023년 중반부터 이사회에 보고되"},{"x":-0.019769790313822616,"y":-0.04483940821006443,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"미래연구진흥센터","title":"미래연구진흥센터","preview":"미래연구진흥센터 # 미래연구진흥센터  > **카테고리**: 연구  ## 개요  기존 '선도연구진흥센터'를 '미래연구진흥센터'로 명칭 변경하고 상설 기구로 공식 직제화하는 학칙 개정. 2026년 제2차 이사회에서 평의원회 통과를 전제로 조건부 추인됨 [[2026-2차]]"},{"x":0.018076423184470544,"y":0.04368221037085151,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"AI-네이티브-캠퍼스","title":"AI 네이티브 캠퍼스","preview":"AI 네이티브 캠퍼스 # AI 네이티브 캠퍼스  > **카테고리**: 연구  ## 개요  서울대학교의 AI 전환 전략. 생성형 AI 캠퍼스 라이선스 도입, AI위원회 확대, AI NATIVE CAMPUS 조성을 2025~2026년 주요 예산 방향으로 추진 [[2025-"},{"x":-0.09042262925399429,"y":0.03961532743596652,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"법인재산","title":"법인재산","preview":"법인재산 # 법인재산  > **카테고리**: 재정  ## 개요  국립대학법인 서울대학교의 법인재산 관련 주요 안건. 관악수목원 국유재산 무상 양도(2023~2025)와 교원주택 매각(2025)이 주요 사안임 [[2023-7차]] [[2025-4차]] [[2025-10차"},{"x":0.05085542959781268,"y":0.24423066783176084,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"시흥캠퍼스","title":"시흥캠퍼스","preview":"시흥캠퍼스 # 시흥캠퍼스  > **카테고리**: 인프라  ## 개요  서울대학교 시흥캠퍼스의 지속적 개발 과정. 치과병원 건립(2023), 배곧서울대학교병원 건립(2023~2025), 재외동포교육문화센터(2024), 우주항공 통합 풍동센터(2025) 등 다양한 시설 사"},{"x":-0.04190228368151202,"y":-0.09457466990756269,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"예산-결산","title":"예산·결산 (법인회계)","preview":"예산·결산 (법인회계) # 예산·결산 (법인회계)  > **카테고리**: 재정  ## 개요 국립대학법인 서울대학교의 법인회계 세입·세출 예산 심의·의결 및 결산 관련 논의. 이사회의 핵심 반복 안건으로 매년 1차(본예산+전년 추경)와 중반(전년 결산)에 정기적으로 심의"},{"x":-0.02996980666037727,"y":0.005524803605068834,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"의과대학-학제개편","title":"의과대학 학제개편","preview":"의과대학 학제개편 # 의과대학 학제개편  > **카테고리**: 학사  ## 개요  서울대학교 의과대학의 예과·본과 체제를 통합 6년제로 개편하는 학칙 변경. 2027학년도 신입생부터 적용 예정으로, 2026년 제1차 이사회에서 추인됨 [[2026-1차]].  ## 주요"},{"x":0.00820740221093594,"y":0.33821342116577535,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"이사-선임","title":"이사 선임","preview":"이사 선임 # 이사 선임  > **카테고리**: 거버넌스  ## 개요  국립대학법인 서울대학교 이사의 선임 절차. 매년 임기 만료 이사의 후임을 선임하기 위해 [[이사후보초빙위원회]]를 구성하고, 위원회가 추천한 후보자를 대상으로 이사회에서 투표를 거쳐 선임함 [[20"},{"x":-0.06198649028766818,"y":0.24825267059939266,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"이사장-선출","title":"이사장 선출","preview":"이사장 선출 # 이사장 선출  > **카테고리**: 거버넌스  ## 개요 국립대학법인 서울대학교 이사장의 선출·교체 과정. 2023~2026년 기간 동안 이사장이 3회 교체되었으며 (지은희 → 권오현 → 최창원), 매 교체 시 임시 이사장을 경유하는 패턴이 확인됨 [["},{"x":-0.09408662862867086,"y":0.17680577620877092,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"이사회-운영","title":"이사회 운영","preview":"이사회 운영 # 이사회 운영  > **카테고리**: 거버넌스  ## 개요  이사회 운영 방식의 개선 과정. 2025년부터 소위원회를 기존 운영소위원회 1개에서 거버넌스·재정소위원회와 교육·연구소위원회 2개로 개편하고, 하이브리드(대면+비대면) 회의를 도입하며, 평의원회"},{"x":0.23166290856875268,"y":-0.02488055589479776,"wikiId":"board","wikiLabel":"이사회","color":"#10B981","pageType":"topic","pageTypeLabel":"토픽","pageId":"임원보수","title":"임원 보수","preview":"임원 보수 # 임원 보수  > **카테고리**: 인사·제도  ## 개요  총장과 상근감사를 대상으로 연봉제를 적용하는 임원 보수지침 제정 및 총장 성과평가 지표 수립에 관한 논의. 2023년 제1차 이사회에서 심의되었으나 소위원회 구성 후 재논의하기로 보류됨 [[202"},{"x":-0.016657309960654038,"y":-0.3027369770092163,"wikiId":"finance","wikiLabel":"재무정보공시","color":"#14B8A6","pageType":"entity","pageTypeLabel":"엔티티","pageId":"산학협력단","title":"산학협력단","preview":"산학협력단 # 산학협력단  ## 개요  서울대학교 산학협력단. 연구과제 수탁·수행, 기술이전, 창업 지원 담당. 종합재무제표 내 4개 주체 중 하나로, 산학협력수익·지원금수익이 종합 전체의 약 47% 차지. 2021년부터 운영수익이 서울대 법인에 근접하는 수준으로 급성"},{"x":-0.02619779590502884,"y":-0.2089194645019096,"wikiId":"finance","wikiLabel":"재무정보공시","color":"#14B8A6","pageType":"entity","pageTypeLabel":"엔티티","pageId":"단과대발전재단","title":"단과대 발전재단","preview":"단과대 발전재단 # 단과대 발전재단  ## 개요  각 단과대학별 발전재단의 집합체. 단과대학별 기부금 수탁·장학금·사업비 지원. 2017년 원문 명칭: \"단과대학 발전기금\" → 이후 \"단과대 발전재단\"으로 변경. 4개 주체 중 규모가 가장 작으며, 기타자산(투자자산) "},{"x":0.000988294203495907,"y":-0.17562597030568036,"wikiId":"finance","wikiLabel":"재무정보공시","color":"#14B8A6","pageType":"entity","pageTypeLabel":"엔티티","pageId":"법인-서울대학교","title":"법인 서울대학교","preview":"법인 서울대학교 # 법인 서울대학교  ## 개요  국립대학법인 서울대학교. 2011년 법인화 이후 독립 법인으로 운영. 종합재무제표 내 4개 주체 중 핵심 법인 주체로, 등록금·정부출연금·교육부대수입 수취. 법인회계 재무제표 기수: 2011+N기 (2024년도 = 제1"},{"x":-0.03115090670020059,"y":-0.19175470678166617,"wikiId":"finance","wikiLabel":"재무정보공시","color":"#14B8A6","pageType":"entity","pageTypeLabel":"엔티티","pageId":"서울대발전재단","title":"(재)서울대발전재단","preview":"(재)서울대발전재단 # (재)서울대발전재단  ## 개요  재단법인 서울대학교발전재단. 기부금 수탁·장학금·연구비 지원 담당. 2017년 이전 명칭: \"(재)서울대 발전기금\" — 2018년경 재단으로 명칭 변경. 자산의 약 92%가 투자자산 등 기타자산 (장기투자증권, "},{"x":-0.0952086556484579,"y":-0.21417824669220376,"wikiId":"finance","wikiLabel":"재무정보공시","color":"#14B8A6","pageType":"fact","pageTypeLabel":"팩트","pageId":"수입구조.fact","title":"운영수입 구조 (2017~2024)","preview":"운영수입 구조 (2017~2024) 카테고리: 수입 # 운영수입 구조 (2017~2024)  종합 운영수익 항목별 추이. 단위: 억원. 내부거래 제거 후 종합 기준.  ## 내용 (단위: 억원)  | 항목 | 2017 | 2018 | 2019 | 2020 | 2021 "},{"x":-0.02999033209526775,"y":-0.1472767906037518,"wikiId":"finance","wikiLabel":"재무정보공시","color":"#14B8A6","pageType":"fact","pageTypeLabel":"팩트","pageId":"예산-세출구조.fact","title":"법인회계 세출 예산 구조 (2017~2026)","preview":"법인회계 세출 예산 구조 (2017~2026) 카테고리: 예산 # 법인회계 세출 예산 구조 (2017~2026)  단위: 억원. 법인회계(서울대 법인 단독) 예산 기준. 2026년은 예산(안). 종합재무제표 기준과 다름 (산학협력단 미포함).  ## 세출 항목별 추이 "},{"x":-0.05237341763183752,"y":-0.23040375263886131,"wikiId":"finance","wikiLabel":"재무정보공시","color":"#14B8A6","pageType":"fact","pageTypeLabel":"팩트","pageId":"주체별-운영수익.fact","title":"주체별 운영수익 (2017~2024)","preview":"주체별 운영수익 (2017~2024) 카테고리: 수입·비용 # 주체별 운영수익 (2017~2024)  단위: 억원. 내부거래 제거 전 개별 수치 + 종합(내부거래 제거 후). 4개 주체: 법인(서울대) · 산학협력단 · (재)서울대발전재단 · 단과대발전재단.  ## 내"},{"x":0.044105582981307366,"y":-0.25998991500681073,"wikiId":"finance","wikiLabel":"재무정보공시","color":"#14B8A6","pageType":"fact","pageTypeLabel":"팩트","pageId":"자산구성.fact","title":"자산 구성 (종합 + 주체별)","preview":"자산 구성 (종합 + 주체별) 카테고리: 7239752,"wikiId":"vision","wikiLabel":"중장기발전계획","color":"#8B5CF6","pageType":"topic","pageTypeLabel":"토픽","pageId":"비전-2040","title":"비전 2040","preview":"비전 2040 # 비전 2040  > **카테고리**: 비전·전략  ## 개요 서울대학교 중장기발전계획(2022년 수립)이 2040년을 목표로 제시한 비전과 3대 임무. 문명사적 전환기의 4대 외부환경 변화에 대응하여 수립 [[중장기-제1장]].  ## 비전  > **"},{"x":0.30914052077431436,"y":-0.13431340860329027,"wikiId":"vision","wikiLabel":"중장기발전계획","color":"#8B5CF6","pageType":"topic","pageTypeLabel":"토픽","pageId":"멀티캠퍼스","title":"멀티캠퍼스","preview":"멀티캠퍼스 # 멀티캠퍼스  > **카테고리**: 캠퍼스·인프라  ## 개요 기후위기·공간 포화·멀티캠퍼스 비효율의 3대 이슈를 진단하고, **친환경 탄소중립 캠퍼스**, **SNU 메타버시티**, **캠퍼스별 특성화**, **공유 공간 개념 도입**으로 지속가능한 미래"},{"x":0.3209104083527535,"y":0.053498218939093664,"wikiId":"vision","wikiLabel":"중장기발전계획","color":"#8B5CF6","pageType":"topic","pageTypeLabel":"토픽","pageId":"7대-핵심과제","title":"7대 핵심과제","preview":"7대 핵심과제 # 7대 핵심과제  > **카테고리**: 비전·전략  ## 개요 비전 \"국가와 인류의 미래에 공헌하는 지식공동체\" 달성을 위해 중장기발전계획이 제시한 7개 중점 추진과제. 제2장 부문별 발전계획(교육I~운영체제VII)과 직접 연계 [[중장기-제1장]]. "},{"x":0.22671588074807802,"y":0.0319830517550705,"wikiId":"vision","wikiLabel":"중장기발전계획","color":"#8B5CF6","pageType":"topic","pageTypeLabel":"토픽","pageId":"교육혁신","title":"교육 혁신","preview":"교육 혁신 # 교육 혁신  > **카테고리**: 교육  ## 개요 문명사적 전환기에 대응하는 서울대학교 교육체계 혁신 방향. 단기(다전공 개선)→중기(무전공 도입)→장기(6년제 Open Loop University) 3단계 로드맵과 생애전주기 교육 플랫폼 구축을 핵심으"},{"x":0.2279906074796823,"y":0.041210097508484374,"wikiId":"vision","wikiLabel":"중장기발전계획","color":"#8B5CF6","pageType":"topic","pageTypeLabel":"토픽","pageId":"국제화사회공헌","title":"국제화·사회공헌","preview":"국제화·사회공헌 # 국제화·사회공헌  > **카테고리**: 국제화·사회공헌  ## 개요 정량 지표 중심 국제화를 내재적·질적 국제화로 전환하고, 사회봉사교과목 졸업요건화·서비스러닝을 통해 지식기반형 사회공헌을 서울대 브랜드로 확립하는 전략 [[중장기-제2장-국제화사회공"},{"x":0.4218203643795107,"y":-0.04737354083831237,"wikiId":"vision","wikiLabel":"중장기발전계획","color":"#8B5CF6","pageType":"topic","pageTypeLabel":"토픽","pageId":"학생지원복지","title":"학생지원·복지","preview":"학생지원·복지 # 학생지원·복지  > **카테고리**: 학생지원  ## 개요 총체적 웰니스(신체+정신+사회적 건강)를 목표로 하는 학생지원·복지 혁신 방향. 분절된 지원 체계를 통합하고, 장학·건강·주거·다양성 4대 영역에서 구성원 중심 시스템으로 전환한다 [[중장기-"},{"x":0.10508125603009508,"y":0.033290123237856545,"wikiId":"vision","wikiLabel":"중장기발전계획","color":"#8B5CF6","pageType":"topic","pageTypeLabel":"토픽","pageId":"재정전략","title":"재정전략","preview":"재정전략 # 재정전략  > **카테고리**: 재정·운영  ## 개요 2040년 목표 재정 규모 3조3,000억 원 달성을 위해 다양한 재원을 확보하고, SNU홀딩스·국가난제연구센터·CFO 부총장급·지능형 ERP 도입으로 재정 자립도와 거버넌스를 혁신한다 [[중장기-제2"},{"x":0.2622618242222547,"y":-0.0992370826324941,"wikiId":"vision","wikiLabel":"중장기발전계획","color":"#8B5CF6","pageType":"topic","pageTypeLabel":"토픽","pageId":"연구전략","title":"연구 전략","preview":"연구 전략 # 연구 전략  > **카테고리**: 연구  ## 개요 국가·인류 난제 해결을 위한 서울대학교 연구 혁신 방향. 대학본부 주관 융복합 연구소 신설, 연구생애 단계별 지원, 트랙별 연구평가 도입, 선(先)연구-후(後)행정 문화 구축을 핵심으로 한다 [[중장기-"},{"x":0.15281174266038727,"y":-0.1316338985395324,"wikiId":"vision","wikiLabel":"중장기발전계획","color":"#8B5CF6","pageType":"topic","pageTypeLabel":"토픽","pageId":"대학운영체제","title":"대학운영체제","preview":"대학운영체제 # 대학운영체제  > **카테고리**: 거버넌스·운영  ## 개요 기술 진보·법인화 한계·비전 공감대 부재의 구조적 문제를 진단하고, 총장선출제도 개선·이사회-대학본부-평의원회 역할 재정립·부총장제 개편·인사혁신으로 성숙한 대학운영체제를 구축한다 [[중장기"},{"x":0.03284980735819348,"y":0.14584569478274792,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"entity","pageTypeLabel":"엔티티","pageId":"인용인물","title":"인용인물 목록","preview":"인용인물 목록 # 인용인물 목록  유홍림 총장 연설에서 명시적으로 인용된 철학자·사상가.  ## 칸트 (Immanuel Kant)  - **인용 맥락**: [[입학식-2026]] - **인용 내용**: \"Sapere aude(감히 알려 하라)\" — 계몽주의적 자립 정신"},{"x":0.22480490023211333,"y":0.17614469374954933,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"entity","pageTypeLabel":"엔티티","pageId":"유홍림","title":"유홍림","preview":"유홍림 # 유홍림  ## 기본 정보  - **직위**: 서울대학교 제27대 총장 - **전공**: 정치외교학부 (정치철학) - **취임**: 2023.2 - **주요 이력**: 서울대 정치외교학부 교수 → 사회대학장 → 총장  ## 핵심 비전  '경계를 넘어 세계로(B"},{"x":0.10868970481719238,"y":-0.061330486136637094,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"입학식-2026","title":"2026학년도 입학식 식사 — 2026. 2. 26.","preview":"## 추출된 stance - [[자유와공동체.유홍림.stance]] - [[그랜드퀘스트.유홍림.stance]] (신년사 stance와 동일 topic — sources 추가)    ## 원문 위치 [[../../raw/md/입학식-2026.md]]"},{"x":0.13598989062282021,"y":0.022469115595296636,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"취임사-2023","title":"제28대 총장 취임사 — 2023. 2. 8.","preview":"## 핵심 메시지 - '서울대의 대전환' 선언: 교육·연구·사회공헌 선제적 재편 - 칸막이 교육 종식 + 학부대학 예고 - 산-관-학 연구혁신 플랫폼 + 혁신 생태계 - '자유와 신뢰의 선순환' 플랫폼으로서의 서울대 - 서울대를 \"겨레의 대학, 국민의 대학\"으로 정의하"},{"x":0.18190878666993648,"y":0.08060830930629403,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"취임사-2023","title":"제28대 총장 취임사 — 2023. 2. 8.","preview":"## 핵심 quote > \"대전환의 시대에 대응하기 위해 서울대의 일대혁신이 필요합니다.\" > — 유홍림, [[취임사-2023]]  > \"서울대라는 터전에서 구성원들이 각자 행복하고 자유롭게 자신의 소명을 추구하는 과정이 자연스럽게 국가와 인류의 미래에 공헌하는 결과로"},{"x":0.22060930632943526,"y":-0.11885537067505683,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"취임사-2023","title":"제28대 총장 취임사 — 2023. 2. 8.","preview":"## 추출된 stance - [[대전환의시대.유홍림.stance]] - [[융합인재양성.유홍림.stance]]    ## 원문 위치 [[../../raw/md/취임사-2023.md]]"},{"x":-0.0771150118551738,"y":0.07507718848672425,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식전기-2023","title":"제77회 전기 학위수여식 식사 — 2023. 2. 24.","preview":"# 제77회 전기 학위수여식 식사 — 2023. 2. 24.    ## 메타 - 취임(2023.2.8.) 직후 첫 학위수여식. 2022.8 폭우 시 중앙도서관 복구에 자발적으로 참여한 260명 학생 사례로 시작."},{"x":0.26416815329540855,"y":-0.14277343547425675,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식전기-2023","title":"제77회 전기 학위수여식 식사 — 2023. 2. 24.","preview":"## 연설 논지 \"코로나로 인한 멈춤의 시간은 잃어버린 시간이 아니라 '면역의 시간'\". 자기 삶의 개척자, 질문을 던지는 사람, AI 시대의 창의성. \"남을 돕는 데 여러분의 지식과 시간을 사용하라\"는 AI 챗봇의 답변 인용."},{"x":0.12133501058450614,"y":0.09587372387166194,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식전기-2023","title":"제77회 전기 학위수여식 식사 — 2023. 2. 24.","preview":"## 핵심 quote > \"인간만이 지닌 고유의 능력, 즉 생각하고 상상하고 탐구하며 구현해내는 그 과정을 온전히 즐기시길 바랍니다.\" > — 유홍림, [[학위수여식전기-2023]]"},{"x":0.1881824860263992,"y":-0.0177172950036256,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식전기-2024","title":"제78회 전기 학위수여식 식사 — 2024. 2. 27.","preview":"# 제78회 전기 학위수여식 식사 — 2024. 2. 27.    ## 메타 - 초청 축사자: 오윤덕 사랑샘재단 이사장 (50여 년 법조인 + 봉사)    ## 연설 논지 전문가를 넘어 공동선을 위한 리더 강조. 협력적 리더십, 다른 분야에 대한 열린 호기심, 공동체 "},{"x":0.1715225177402876,"y":0.02659528497698103,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식전기-2024","title":"제78회 전기 학위수여식 식사 — 2024. 2. 27.","preview":"## 핵심 quote > \"오늘날의 리더십은 공동선을 실현하는 협력적 리더십이어야 하고, 이는 다른 전문 분야에 대한 열린 호기심뿐만 아니라 공동체 구성원으로서의 책임감, 다른 사람들에 대한 공감과 배려라는 덕목도 요구합니다.\" > — 유홍림, [[학위수여식전기-202"},{"x":0.3157470594471664,"y":0.0439572248576961,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식전기-2025","title":"제79회 전기 학위수여식 식사 — 2025. 2. 26.","preview":"# 제79회 전기 학위수여식 식사 — 2025. 2. 26.    ## 메타 - 초청 축사자: 김인권 원장 (50여 년 법조인 + 소외계층 봉사)    ## 연설 논지 용기와 '함께 사는 삶'을 두 핵심 덕목으로 제시. 용기는 무모함이 아니라 \"면밀한 분석 + 의연한 "},{"x":0.28339812727675484,"y":-0.02037900502783363,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식전기-2025","title":"제79회 전기 학위수여식 식사 — 2025. 2. 26.","preview":"## 핵심 메시지 - 용기 = 관성 극복 + 결과를 의연히 수용하는 성숙 - 함께 사는 삶 = 공동체 안에서 개인의 성취가 진정 빛남 - \"개인을 둘러싼 겹겹의 공동체 안에서 삶의 궤적을 끊임없이 성찰\""},{"x":0.24223979651500774,"y":0.08972456295522171,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식전기-2025","title":"제79회 전기 학위수여식 식사 — 2025. 2. 26.","preview":"## 핵심 quote > \"용기가 세속적 성공을 보장하지는 않지만, 희비가 엇갈리는 삶의 과정을 인내하고 헤쳐나가는 힘의 원천임은 분명합니다.\" > — 유홍림, [[학위수여식전기-2025]]"},{"x":-0.04797234116578295,"y":-0.0966581978453748,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식전기-2025","title":"제79회 전기 학위수여식 식사 — 2025. 2. 26.","preview":"## 추출된 stance (없음) - 의례적 졸업 격려. 자유와공동체 stance와 연결 가능하나 독립 stance 없음.    ## 원문 위치 [[../../raw/md/학위수여식전기-2025.md]]"},{"x":0.24272657633202288,"y":0.17817034152459937,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식전기-2026","title":"제80회 전기 학위수여식 식사 — 2026. 2. 25.","preview":"## 핵심 메시지 - 지적 역량 + 도덕적 역량(용기·절제·관용·정의)이 진정한 행복의 조건 - 아리스토텔레스: 행복은 안착 상태가 아닌 지속적 활동 - 공동체는 나의 행복을 지탱하는 구조적 기반 - 서울대 구성원 모두의 희생·지원·국민의 염원이 교육의 자양분"},{"x":0.19201448197435528,"y":0.20776195262515232,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식전기-2026","title":"제80회 전기 학위수여식 식사 — 2026. 2. 25.","preview":"## 핵심 quote > \"'지적 역량'뿐 아니라 '도덕적 역량', 즉 올바른 습관과 행동을 통해 함양되는 품성이 더욱 의미 있는 행복의 조건입니다. 행복은 단순히 아는 것으로 그치지 않고, 아는 바를 선하게 실천하는 삶에서 완성되기 때문입니다.\" > — 유홍림, [["},{"x":0.27062036813850343,"y":0.023488801910652807,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식후기-2023","title":"제77회 후기 학위수여식 식사 — 2023. 8. 29.","preview":"# 제77회 후기 학위수여식 식사 — 2023. 8. 29.    ## 메타 - 초청 축사자: 최재천 교수 ('호모 심비우스/공생하는 인간' 주창)    ## 연설 논지 최재천 교수의 '공생하는 인간' 개념으로 공동체와 다양성 강조. LnL 사업 목표(앞으로 몇 년 내"},{"x":0.2384564482719852,"y":0.06100065488860085,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식후기-2023","title":"제77회 후기 학위수여식 식사 — 2023. 8. 29.","preview":"## 핵심 quote > \"포용성을 바탕으로 조화로운 공동체를 만들어 가야 합니다. '다양성에 대한 감수성'과 '타인에 대한 공감'을 통하여 공동체 안에서 행복을 누릴 수 있습니다.\" > — 유홍림, [[학위수여식후기-2023]]"},{"x":0.11800512511342298,"y":0.10198596438313792,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식후기-2024","title":"제78회 후기 학위수여식 식사 — 2024. 8. 30.","preview":"# 제78회 후기 학위수여식 식사 — 2024. 8. 30.    ## 메타 - 초청 축사자: 김준구 네이버웹툰 대표 (웹툰 초창기부터 K-웹툰 글로벌화)    ## 연설 논지 서울대 졸업생으로서의 자긍심을 \"자랑이나 오만\"이 아닌 \"배움과 공헌의 가치에 대한 자긍심\""},{"x":0.15438444589352593,"y":0.11986712683495085,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식후기-2024","title":"제78회 후기 학위수여식 식사 — 2024. 8. 30.","preview":"## 핵심 quote > \"서울대 졸업생이라는 이름은 자신을 내세우기 위한 간판이 아니라 미래를 여는 배움과 공헌의 가치에 대한 우리의 자긍심을 대변하는 자격입니다.\" > — 유홍림, [[학위수여식후기-2024]]"},{"x":-0.030466987664684503,"y":0.14444956116497193,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식후기-2025","title":"제79회 후기 학위수여식 식사 — 2025. 9. 4.","preview":"# 제79회 후기 학위수여식 식사 — 2025. 9. 4.    ## 메타 - 행사: 제79회 후기 학위수여식 / 2025.8.28. (공개 9.4.) - 초청 축사자: 국악과 안나 예이츠 교수 (영국 출신, 정치학→판소리로 전환)"},{"x":0.23975882156079678,"y":-0.11839356542693218,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식후기-2025","title":"제79회 후기 학위수여식 식사 — 2025. 9. 4.","preview":"## 연설 논지 불안은 나약함이 아니라 미답지를 개척하는 자의 감정이라고 정의하며 졸업생들을 격려. 혼자의 싸움이 아닌 협력적 연대의 중요성 강조. SNU공헌단·SNU SOLAR EV 등 구체적 협력 사례 소개."},{"x":0.1793494017195551,"y":-0.09028972244382373,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식후기-2025","title":"제79회 후기 학위수여식 식사 — 2025. 9. 4.","preview":"## 핵심 메시지 - 불안의 재정의: 나약함이 아닌 \"새로운 세계로 발을 내딛고 있다는 증거\" - 혼자가 아닌 협력적 상호작용 강조 - 구체적 사례: 샤하띠팀(인도네시아 봉사), SNU SOLAR EV(호주 태양광 경주)"},{"x":0.12271896227685457,"y":0.012566552532955102,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식후기-2025","title":"제79회 후기 학위수여식 식사 — 2025. 9. 4.","preview":"## 핵심 quote > \"인간이 느끼는 불안은 결코 나약함의 표현이 아닙니다. 불안은 우리로 하여금 근본적인 질문을 던지도록 합니다. 여러분이 불안을 느낀다면, 그것은 새로운 세계로 발을 내딛고 있다는 증거입니다.\" > — 유홍림, [[학위수여식후기-2025]]"},{"x":-0.03521441206950654,"y":0.05631509835430676,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"신년사-2026","title":"2026년 신년사 — 2026. 1. 2.","preview":"# 2026년 신년사 — 2026. 1. 2.    ## 메타 - 행사: 2026년 신년사 / 2026.1.2. - 개교 80주년의 해를 여는 신년사. SNU 그랜드퀘스트 공식 시작 발표."},{"x":0.11406399907101183,"y":0.03695401388062056,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"신년사-2026","title":"2026년 신년사 — 2026. 1. 2.","preview":"## 핵심 메시지 - **SNU 그랜드퀘스트 사업 시작** — 난제 해결 질문 기반 연구대학 - **AI Native 캠퍼스** — AI 가이드라인, 캠퍼스 라이선스, AI 대학원(2027) - **국제화 전면 개편** — 국제처 출범, 외국인 지원센터 신설 - 80주"},{"x":0.2786125694157887,"y":-0.07454509956811278,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"취임사-2023","title":"제28대 총장 취임사 — 2023. 2. 8.","preview":"## 연설 논지 취임과 함께 '서울대의 일대혁신'과 '대전환'을 선언. 교육·연구·사회공헌의 틀을 선제적으로 재편하겠다고 약속. 칸막이 교육의 종식, 산-관-학 연구혁신 플랫폼 구축, 신뢰 기반 거버넌스로의 전환을 3대 혁신 과제로 제시. \"복합적인 도전에 담대히 응하"},{"x":0.21507154700611944,"y":0.01910747702876266,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"신년사-2026","title":"2026년 신년사 — 2026. 1. 2.","preview":"## 핵심 quote > \"올해 연구 분야에서는 '질문 기반 연구대학'을 목표로 'SNU 그랜드 퀘스트(Grand Quest)'사업을 시작합니다. 한국 사회와 인류가 직면한 난제 해결에 새로운 돌파구를 제시할 수 있는 도전적 질문을 발굴하여 이를 연구과제로 지원할 것입"},{"x":0.1355303676574627,"y":-0.0324520620734505,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"신년사-2026","title":"2026년 신년사 — 2026. 1. 2.","preview":"## 추출된 stance - [[그랜드퀘스트.유홍림.stance]] - [[80주년-비전.유홍림.stance]]    ## 원문 위치 [[../../raw/md/신년사-2026.md]]"},{"x":0.2843949979191935,"y":0.13708225244633476,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"입학식-2023","title":"2023학년도 입학식 식사 — 2023. 3. 3.","preview":"# 2023학년도 입학식 식사 — 2023. 3. 3.    ## 연설 논지 '참된 지성인'의 개념 정의: 폭넓은 이해 + 총체적 인식 + 학제를 뛰어넘는 배움. 자신의 전공에 매몰되지 말고 통합적 사고능력 개발. 개인의 성장 = 사회적 책임과 연결."},{"x":0.21440185091019878,"y":0.16007120816686002,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"입학식-2023","title":"2023학년도 입학식 식사 — 2023. 3. 3.","preview":"## 핵심 quote > \"대학에서의 배움은 단순한 지식의 습득이나 좋은 학점의 획득과는 다른 것이 되어야 합니다. 대학에서의 배움은 무엇보다도 '참된 지성인'이 되기 위한 토대를 마련하는 일이 되어야 합니다.\" > — 유홍림, [[입학식-2023]]"},{"x":0.14527867524367366,"y":0.0015005482441334157,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"입학식-2024","title":"2024학년도 입학식 식사 — 2024. 2. 29.","preview":"# 2024학년도 입학식 식사 — 2024. 2. 29.    ## 연설 논지 자신만의 답을 찾아가는 자립과, 타인과 연대하는 공감을 동시에 강조. 대전환의 시대에 대학의 역할과 신입생의 책임을 연결."},{"x":0.13114706168535015,"y":0.13133820835467652,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"입학식-2024","title":"2024학년도 입학식 식사 — 2024. 2. 29.","preview":"## 핵심 quote > \"대학은 지식과 기술을 전수하고 창출하는 기관이기도 하지만 더 근본적으로는 사람을 길러내는 곳입니다.\" > — 유홍림, [[입학식-2024]]    ## 추출된 stance (없음)"},{"x":0.1480342556970611,"y":-0.05914628913320601,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"입학식-2025","title":"2025학년도 입학식 식사 — 2025. 2. 27.","preview":"# 2025학년도 입학식 식사 — 2025. 2. 27.    ## 메타 - 행사: 2025학년도 입학식 / 2025.2.27. / 종합화 50주년 기념해    ## 연설 논지 복잡계 이론의 '인접 가능성(adjacent possible)' 개념을 통해 \"작은 출발이 "},{"x":0.09115910139442834,"y":0.06456587248990804,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899", 1975년 관악캠퍼스 통합)"},{"x":0.22860267388979463,"y":-0.008854927736234905,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"개교기념사-78주년-2024","title":"제78주년 개교기념사 — 2024. 10. 15.","preview":"## 핵심 quote > \"결국 서울대를 바꾸는 힘은 우리 구성원들 사이의 상호 신뢰와 실천 의지로부터 나와야 합니다.\" > — 유홍림, [[개교기념사-78주년-2024]]    ## 추출된 stance (없음) - 혁신 과제 나열 위주. 독립 stance 없음."},{"x":0.21785626434280697,"y":0.03062101337011388,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"신년사-2024","title":"2024년 신년사 — 2024. 1. 2.","preview":"# 2024년 신년사 — 2024. 1. 2.    ## 연설 논지 교육 혁신을 최우선 과제로 재선언. 학부대학 출범 준비, 첨단융합학부 출범, 행정 혁신. 창발성 이론 인용 — 다학제 교육이 종합대학의 창발성 조건. \"지성의 용기\" 강조."},{"x":0.1993418531183988,"y":0.08771505905578583,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"신년사-2024","title":"2024년 신년사 — 2024. 1. 2.","preview":"## 핵심 quote > \"지성의 용기에 대해서도 생각해 봅시다. 용기는 관성에서 벗어나 변화를 이끄는 힘의 원천입니다. 참된 지성은 질문에만 머물지 않습니다. 용기는 답으로 얻어진 가치를 우리의 삶 속에 실현하는 힘입니다.\" > — 유홍림, [[신년사-2024]]"},{"x":0.1860800072622961,"y":0.023887584568663606,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"신년사-2025","title":"2025년 신년사 — 2025. 1. 2.","preview":"# 2025년 신년사 — 2025. 1. 2.    ## 메타 - 특이사항: 2024.12.29 항공사고 희생자 추모 언급, 국가 위기(정치적 혼돈) 언급    ## 연설 논지 정치적 혼돈 속에서도 대학의 역할은 \"미래를 대비하는 교육 혁신과 집단지성의 발현\". 취임 "},{"x":0.2508448995504698,"y":0.03527109501058975,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"신년사-2025","title":"2025년 신년사 — 2025. 1. 2.","preview":"## 핵심 메시지 - 학부대학 출범(2025.3) 준비 완료 - AI + 글로벌 바이오 클러스터 + 국가미래전략원 - SNU Outreach: 지역대학 협력 플랫폼 확대 - \"독선이 아닌 절제와 균형, 상호존중이 문제 해결의 열쇠\""},{"x":0.21993600455388734,"y":0.02404174883789495,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"신년사-2025","title":"2025년 신년사 — 2025. 1. 2.","preview":"## 핵심 quote > \"어려운 시기일수록 서울대는 미래를 대비하는 교육 혁신과 집단지성의 발현을 통해 새로운 희망과 진취적 대안을 제시하기 위해 모든 역량을 결집해야 합니다.\" > — 유홍림, [[신년사-2025]]"},{"x":0.049695646079542834,"y":-0.06738186799298616,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"신년사-2025","title":"2025년 신년사 — 2025. 1. 2.","preview":"## 추출된 stance (없음) - 성과 보고 + 계획 발표 위주. 독립 stance 없음 (대전환의시대 stance 연계 참조).    ## 원문 위치 [[../../raw/md/신년사-2025.md]]"},{"x":0.13958270477270923,"y":-0.004835572110621397,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"신년사-2026","title":"2026년 신년사 — 2026. 1. 2.","preview":"## 연설 논지 개교 80주년을 맞아 지난 80년을 성찰하고 100주년을 향한 설계를 시작할 것을 촉구. 주요 신규 사업 3가지(그랜드퀘스트, AI Native 캠퍼스, 국제화 전면 개편)를 발표. \"큰 강물은 조용히 흐르지만 물길을 바꾼다\"는 표현으로 서울대의 조용하"},{"x":0.1480594166146564,"y":-0.034009680175221976,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"개교기념사-79주년-2025","title":"제79주년 개교기념사 (종합화 50주년) — 2025. 10. 17.","preview":"## 추출된 stance - [[80주년-비전.유홍림.stance]] (종합화 50주년 + 개교 80주년 준비)    ## 원문 위치 [[../../raw/md/개교기념사-79주년-2025.md]]"},{"x":0.24915944446209623,"y":0.03615867717555707,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"개교기념사-79주년-2025","title":"제79주년 개교기념사 (종합화 50주년) — 2025. 10. 17.","preview":"## 핵심 quote > \"이제 우리는 빠른 추격을 넘어 새로운 돌파구를 열어가는 단계로 도약해야 합니다. 국가와 국민 앞에 놓여있는 난제에 해법을 제시하고 인류가 봉착한 위기를 극복할 수 있도록 더욱더 연구와 실천에 매진하겠습니다.\" > — 유홍림, [[개교기념사-7"},{"x":0.11727491318244748,"y":0.0568867346149762,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"개교기념사-79주년-2025","title":"제79주년 개교기념사 (종합화 50주년) — 2025. 10. 17.","preview":"## 핵심 메시지 - 비전: '경계를 넘어 세계로(Beyond Boundaries and to the World)' - 종합화 50년 = 분산→통합→시너지의 역사 - 추격에서 선도로 전환 선언 - SNU Grand Quest R&D 내년부터 시작 (예고) - 지역 연계"},{"x":0.14409505842573855,"y":0.0635076147074437,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"취임사-2023","title":"제28대 총장 취임사 — 2023. 2. 8.","preview":"# 제28대 총장 취임사 — 2023. 2. 8.    ## 메타 - 행사: 제28대 총장 취임식 / 2023.2.8. / 서울대학교 - 유홍림 총장의 첫 공식 연설 — 서울대 대전환의 방향과 비전 선언"},{"x":0.1545643250486195,"y":-0.059826960224077394,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"개교기념사-77주년-2023","title":"제77주년 개교기념사 — 2023. 10. 17.","preview":"## 추출된 stance - [[대전환의시대.유홍림.stance]] (연결 — 동일 topic, 취임사와 함께 sources에 추가)    ## 원문 위치 [[../../raw/md/개교기념사-77주년-2023.md]]"},{"x":0.33856190004795605,"y":0.04355103397450965,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식전기-2026","title":"제80회 전기 학위수여식 식사 — 2026. 2. 25.","preview":"## 연설 논지 아리스토텔레스의 행복 개념을 빌려 지적 탁월함만이 아닌 도덕적 역량(용기·절제·관용·정의)의 중요성 강조. 공동체 속에서 나의 삶이 의미를 갖는다는 연대의 가치. 지속적인 배움과 실천이 행복의 조건."},{"x":0.13222783335228633,"y":0.15068363791171283,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"source","pageTypeLabel":"회의록/소스","pageId":"학위수여식전기-2026","title":"제80회 전기 학위수여식 식사 — 2026. 2. 25.","preview":"# 제80회 전기 학위수여식 식사 — 2026. 2. 25.    ## 메타 - 행사: 제80회 전기 학위수여식 / 2026.2.25. - 초청 축사자: 최수연 네이버 대표 (서울대 공대+언론정보 복수전공, 변호사 자격 취득)"},{"x":0.29411988469928174,"y":0.05755198877146769,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"stance","pageTypeLabel":"입장","pageId":"대전환의시대.유홍림.stance","title":"대전환의시대 — 유홍림의 입장","preview":"대전환의시대 — 유홍림의 입장 발언자: 유홍림 주제: 대전환의시대 # 대전환의시대 — 유홍림의 입장  ## 핵심 입장 대전환의 시대는 서울대에 위기이자 기회이며, 이에 대응하기 위해 교육·연구·사회공헌의 일대혁신이 필요하다. \"복합적인 도전에 담대히 응하여 대전환의 기"},{"x":0.2732555935198061,"y":0.014715618475072287,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"stance","pageTypeLabel":"입장","pageId":"AI시대대학역할.유홍림.stance","title":"AI시대대학역할 — 유홍림의 입장","preview":"AI시대대학역할 — 유홍림의 입장 발언자: 유홍림 주제: AI시대대학역할 # AI시대대학역할 — 유홍림의 입장  ## 핵심 입장 AI 시대에 대학은 AI를 배제하는 것이 아니라 'AI Native 캠퍼스'를 목표로 능동적으로 통합해야 한다. 동시에 AI가 대체할 수 없"},{"x":0.26792139342068966,"y":0.0525495748371952,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"stance","pageTypeLabel":"입장","pageId":"자유와공동체.유홍림.stance","title":"자유와공동체 — 유홍림의 입장","preview":"자유와공동체 — 유홍림의 입장 발언자: 유홍림 주제: 자유와공동체 # 자유와공동체 — 유홍림의 입장  ## 핵심 입장 '홀로 서는 용기(자립)'과 '함께 서는 법(연대)'은 서로 배타적이 아니다. 진정한 나다움은 타자와의 공동체 속에서 완성된다. 대학은 이 두 가지를 "},{"x":0.17247257721125428,"y":0.11439576240839323,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"stance","pageTypeLabel":"입장","pageId":"80주년-비전.유홍림.stance","title":"80주년-비전 — 유홍림의 입장","preview":"80주년-비전 — 유홍림의 입장 발언자: 유홍림 주제: 80주년-비전 # 80주년-비전 — 유홍림의 입장  ## 핵심 입장 개교 80주년(2026)은 지난 80년을 성찰하고 100주년을 향해 설계를 시작하는 전환점이다. '경계를 넘어 세계로(Beyond Boundari"},{"x":0.21638157731830968,"y":0.1374486208016329,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"stance","pageTypeLabel":"입장","pageId":"그랜드퀘스트.유홍림.stance","title":"그랜드퀘스트 — 유홍림의 입장","preview":"그랜드퀘스트 — 유홍림의 입장 발언자: 유홍림 주제: 그랜드퀘스트 # 그랜드퀘스트 — 유홍림의 입장  ## 핵심 입장 SNU 그랜드퀘스트(Grand Quest) 사업은 한국 사회와 인류가 직면한 난제 해결을 위한 도전적 질문 기반 연구를 지원하는 플랫폼이다. 2026년"},{"x":0.28745709087366816,"y":0.1293080244110885,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"stance","pageTypeLabel":"입장","pageId":"융합인재양성.유홍림.stance","title":"융합인재양성 — 유홍림의 입장","preview":"융합인재양성 — 유홍림의 입장 발언자: 유홍림 주제: 융합인재양성 # 융합인재양성 — 유홍림의 입장  ## 핵심 입장 칸막이 전공 교육의 시효는 끝났다. 학제를 초월한 통합적 사고와 비판적 사고를 갖춘 융합 인재를 길러야 하며, 이를 위해 학부대학을 핵심 플랫폼으로 삼"},{"x":0.27348456590492354,"y":0.17137372753132013,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"stance","pageTypeLabel":"입장","pageId":"도덕적역량.유홍림.stance","title":"도덕적역량 — 유홍림의 입장","preview":"도덕적역량 — 유홍림의 입장 발언자: 유홍림 주제: 도덕적역량 # 도덕적역량 — 유홍림의 입장  ## 핵심 입장 지적 역량만으로는 행복의 충분조건이 아니다. 올바른 습관과 행동을 통해 함양되는 도덕적 역량(용기·절제·관용·정의)이 더욱 의미 있는 행복의 조건이며, 실천"},{"x":0.08870622402357325,"y":-0.011182492215966656,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"topic","pageTypeLabel":"토픽","pageId":"80주년-비전","title":"80주년-비전","preview":"80주년-비전 # 80주년-비전  개교 80주년(2026)을 100주년 향한 설계 원년으로 규정하는 전략 프레임. '경계를 넘어 세계로(Beyond Boundaries and to the World)' 슬로건.  ## 유홍림 stance  - [[80주년-비전.유홍림."},{"x":0.1423206908061772,"y":0.031247267047205405,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"topic","pageTypeLabel":"토픽","pageId":"융합인재양성","title":"융합인재양성","preview":"융합인재양성 # 융합인재양성  학문 경계를 넘는 교육·연구 통합. 유홍림 총장이 '경계를 넘어 세계로' 비전의 교육 구현체로 제시하는 의제.  ## 유홍림 stance  - [[융합인재양성.유홍림.stance]] — 학제 간 심층 교육·연구 통합, 기초학문 보호 병행 "},{"x":0.29939882742049745,"y":0.10991539987054451,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"topic","pageTypeLabel":"토픽","pageId":"도덕적역량","title":"도덕적역량","preview":"도덕적역량 # 도덕적역량  지적 역량 단독으로는 행복의 충분조건이 아니라는 인식 아래, 올바른 습관·행동을 통해 함양되는 품성(용기·절제·관용·정의)을 강조하는 교육 가치.  ## 유홍림 stance  - [[도덕적역량.유홍림.stance]] — 아리스토텔레스 행복론 "},{"x":0.23006687546070057,"y":-0.05475245008203057,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"topic","pageTypeLabel":"토픽","pageId":"대전환의시대","title":"대전환의시대","preview":"대전환의시대 # 대전환의시대  AI·기술혁신·사회변동이 맞물린 '전례 없는 전환기'라는 시대 진단. 유홍림 총장이 취임사(2023)부터 지속적으로 사용하는 시대 인식 프레임.  ## 유홍림 stance  - [[대전환의시대.유홍림.stance]] — \"추격에서 선도로\""},{"x":0.1874470383027551,"y":0.09225834022913257,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"topic","pageTypeLabel":"토픽","pageId":"그랜드퀘스트","title":"그랜드퀘스트","preview":"그랜드퀘스트 # 그랜드퀘스트  SNU Grand Quest 사업 — 한국 사회·인류의 난제 해결을 위한 '질문 기반 연구대학' 프로젝트. 2026년 공식 시작, 누적 약 1,000억 원 투자 계획.  ## 유홍림 stance  - [[그랜드퀘스트.유홍림.stance]]"},{"x":0.2521367597625117,"y":-0.027516087431183646,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"topic","pageTypeLabel":"토픽","pageId":"AI시대대학역할","title":"AI시대대학역할","preview":"AI시대대학역할 # AI시대대학역할  생성형 AI·기술 가속화 시대에 대학이 AI를 능동적으로 통합하면서도 AI가 대체할 수 없는 인간적 역량(비판적 사유, 주체적 판단, 도덕적 역량)을 함양해야 한다는 의제.  ## 유홍림 stance  - [[AI시대대학역할.유홍림"},{"x":0.26703959524850296,"y":-0.04741961692688623,"wikiId":"yhl-speeches","wikiLabel":"유홍림총장연설","color":"#EC4899","pageType":"topic","pageTypeLabel":"토픽","pageId":"자유와공동체","title":"자유와공동체","preview":"자유와공동체 # 자유와공동체  개인의 자립(홀로 서기)과 타인과의 연대(함께 서기)가 대립이 아니라 상호 완성임을 강조하는 가치 프레임. 칸트의 '홀로 서기(Sapere aude)'에 '과감히 들으려 하라' 덕목을 추가하여 확장.  ## 유홍림 stance  - [[자"}];

(function() {
  const W = window.innerWidth, H = window.innerHeight - 44;

  // ── 섬 레이아웃 좌표 계산 (청크 단위) ──
  const wikiGroups = d3.group(DATA, d => d.wikiId);
  const wikiStats = {};
  for (const [wid, pts] of wikiGroups) {
    wikiStats[wid] = {
      cx: d3.mean(pts, p => p.x), cy: d3.mean(pts, p => p.y),
      sx: d3.deviation(pts, p => p.x) || 1, sy: d3.deviation(pts, p => p.y) || 1,
    };
  }
  const SPREAD = 72;
  DATA.forEach(d => {
    const lay = WIKI_LAYOUT[d.wikiId] || { fx: 0.5, fy: 0.5 };
    const st = wikiStats[d.wikiId];
    d.dx = lay.fx * W + (d.x - st.cx) / st.sx * SPREAD;
    d.dy = lay.fy * H + (d.y - st.cy) / st.sy * SPREAD;
  });

  // ── 페이지 단위 집약 ──
  const pageMap = new Map();
  DATA.forEach(d => {
    const key = d.wikiId + '||' + d.pageId;
    if (!pageMap.has(key)) pageMap.set(key, {
      key, wikiId: d.wikiId, pageId: d.pageId,
      title: d.title, wikiLabel: d.wikiLabel, color: d.color,
      pageType: d.pageType, pageTypeLabel: d.pageTypeLabel, chunks: []
    });
    pageMap.get(key).chunks.push(d);
  });
  const pages = [...pageMap.values()].map(p => {
    const count = p.chunks.length;
    return {
      ...p, count,
      r: Math.max(6, Math.sqrt(count) * 4),
      ox: d3.mean(p.chunks, c => c.x),   // original PCA
      oy: d3.mean(p.chunks, c => c.y),
      dx: d3.mean(p.chunks, c => c.dx),  // island
      dy: d3.mean(p.chunks, c => c.dy),
      preview: p.chunks[0].preview,
    };
  });

  // ── 위키 내 엣지: k=2 근접 이웃 ──
  const withinEdgeSet = new Set();
  const withinEdges = [];
  for (const [wid, wps] of d3.group(pages, p => p.wikiId)) {
    for (const p of wps) {
      const sorted = wps.filter(q => q !== p)
        .sort((a, b) => Math.hypot(a.dx - p.dx, a.dy - p.dy) - Math.hypot(b.dx - p.dx, b.dy - p.dy));
      for (const q of sorted.slice(0, 2)) {
        const ek = [p.key, q.key].sort().join('~~~');
        if (!withinEdgeSet.has(ek)) {
          withinEdgeSet.add(ek);
          withinEdges.push({ s: p, t: q, color: p.color });
        }
      }
    }
  }

  // ── 위키 간 엣지: 원래 PCA 거리 기준 상위 20쌍 ──
  const crossPairs = [];
  for (let i = 0; i < pages.length; i++) {
    for (let j = i + 1; j < pages.length; j++) {
      if (pages[i].wikiId !== pages[j].wikiId) {
        crossPairs.push({
          s: pages[i], t: pages[j],
          dist: Math.hypot(pages[i].ox - pages[j].ox, pages[i].oy - pages[j].oy)
        });
      }
    }
  }
  crossPairs.sort((a, b) => a.dist - b.dist);
  const crossEdges = crossPairs.slice(0, 20);

  // ── SVG 세팅 ──
  const svg = d3.select('#canvas').attr('width', W).attr('height', H + 44);
  const root = svg.append('g').attr('transform', 'translate(0,44)');
  svg.call(d3.zoom().scaleExtent([0.2, 30]).on('zoom', e => {
    root.attr('transform', 'translate(0,44) ' + e.transform);
  }));

  // ── 클러스터 배경 ──
  const bgLayer = root.append('g');
  for (const [wid, wps] of wikiGroups) {
    const lay = WIKI_LAYOUT[wid]; if (!lay) continue;
    const cx = lay.fx * W, cy = lay.fy * H;
    const color = wps[0].color;
    const cnt = wps.length;
    bgLayer.append('circle').attr('cx', cx).attr('cy', cy)
      .attr('r', SPREAD * 1.5 + Math.sqrt(cnt) * 2.2)
      .attr('fill', color).attr('fill-opacity', 0.05)
      .attr('stroke', color).attr('stroke-opacity', 0.12).attr('stroke-width', 1);
    bgLayer.append('text').attr('x', cx).attr('y', cy - SPREAD * 1.5 - Math.sqrt(cnt) * 2.2 - 7)
      .attr('text-anchor', 'middle')
      .attr('font-size', 11).attr('font-weight', '700')
      .attr('fill', color).attr('fill-opacity', 0.7)
      .text(wps[0].wikiLabel);
  }

  // ── 위키 간 엣지 (점선) ──
  const crossLayer = root.append('g').attr('id', 'cross-edges');
  crossEdges.forEach(({ s, t }) => {
    crossLayer.append('line')
      .attr('x1', s.dx).attr('y1', s.dy).attr('x2', t.dx).attr('y2', t.dy)
      .attr('stroke', '#94a3b8').attr('stroke-opacity', 0.18)
      .attr('stroke-width', 1).attr('stroke-dasharray', '4,5');
  });

  // ── 위키 내 엣지 (실선) ──
  const withinLayer = root.append('g').attr('id', 'within-edges');
  withinEdges.forEach(({ s, t, color }) => {
    withinLayer.append('line')
      .attr('x1', s.dx).attr('y1', s.dy).attr('x2', t.dx).attr('y2', t.dy)
      .attr('stroke', color).attr('stroke-opacity', 0.22)
      .attr('stroke-width', 0.8);
  });

  // ── 청크 점 (배경, 기본 숨김) ──
  const chunkLayer = root.append('g').attr('id', 'chunks').attr('display', 'none');
  chunkLayer.selectAll('circle').data(DATA).join('circle')
    .attr('cx', d => d.dx).attr('cy', d => d.dy).attr('r', 2)
    .attr('fill', d => d.color).attr('fill-opacity', 0.3);

  // ── 페이지 노드 ──
  const tooltip = document.getElementById('tooltip');
  const pageLayer = root.append('g').attr('id', 'pages');
  const pageNodes = pageLayer.selectAll('circle').data(pages).join('circle')
    .attr('cx', d => d.dx).attr('cy', d => d.dy).attr('r', d => d.r)
    .attr('fill', d => d.color).attr('fill-opacity', 0.82)
    .attr('stroke', d => d.pageType === 'source' ? '#fff' : d.color)
    .attr('stroke-width', d => d.pageType === 'source' ? 1.2 : 0)
    .attr('stroke-opacity', 0.4)
    .style('cursor', 'pointer')
    .on('mouseover', function(event, d) {
      d3.select(this).attr('r', d.r * 1.5).attr('fill-opacity', 1).attr('stroke', '#fff').attr('stroke-width', 2).attr('stroke-opacity', 1);
      document.getElementById('t-badge').textContent = d.wikiLabel + ' · ' + d.pageTypeLabel;
      document.getElementById('t-badge').style.background = d.color + '33';
      document.getElementById('t-badge').style.color = d.color;
      document.getElementById('t-title').textContent = d.title || d.pageId;
      document.getElementById('t-meta').textContent = '청크 ' + d.count + '개  ·  ' + d.pageId;
      document.getElementById('t-preview').textContent = d.preview;
      tooltip.style.display = 'block';
    })
    .on('mousemove', event => {
      const x = event.clientX + 16, y = event.clientY + 16;
      tooltip.style.left = (x + 280 > window.innerWidth ? x - 296 : x) + 'px';
      tooltip.style.top = (y + 160 > window.innerHeight ? y - 160 : y) + 'px';
    })
    .on('mouseout', function(event, d) {
      d3.select(this).attr('r', d.r).attr('fill-opacity', 0.82)
        .attr('stroke', d.pageType === 'source' ? '#fff' : d.color)
        .attr('stroke-width', d.pageType === 'source' ? 1.2 : 0)
        .attr('stroke-opacity', 0.4);
      tooltip.style.display = 'none';
    });

  // ── 범례 ──
  const hidden = new Set();
  const legendEl = document.getElementById('legend-items');
  for (const [wid, wps] of wikiGroups) {
    const item = document.createElement('div');
    item.className = 'legend-item';
    const wikiPages = pages.filter(p => p.wikiId === wid);
    item.innerHTML =
      '<span class="legend-dot" style="background:' + wps[0].color + '"></span>' +
      '<span>' + wps[0].wikiLabel + '</span>' +
      '<span class="legend-cnt">' + wikiPages.length + 'p</span>';
    item.onclick = () => {
      if (hidden.has(wid)) { hidden.delete(wid); item.classList.remove('dimmed'); }
      else { hidden.add(wid); item.classList.add('dimmed'); }
      pageNodes.attr('display', d => hidden.has(d.wikiId) ? 'none' : null);
      d3.selectAll('#within-edges line').attr('display', e => hidden.has(e.s.wikiId) ? 'none' : null);
    };
    legendEl.appendChild(item);
  }

  // ── 토글 ──
  let showEdges = true, showChunks = false;
  document.getElementById('btn-edges').onclick = function() {
    showEdges = !showEdges;
    this.classList.toggle('active', showEdges);
    d3.select('#within-edges').attr('display', showEdges ? null : 'none');
    d3.select('#cross-edges').attr('display', showEdges ? null : 'none');
  };
  document.getElementById('btn-chunks').onclick = function() {
    showChunks = !showChunks;
    this.classList.toggle('active', showChunks);
    d3.select('#chunks').attr('display', showChunks ? null : 'none');
  };

  // ── 검색 ──
  document.getElementById('search-box').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    if (!q) { pageNodes.attr('fill-opacity', 0.82).attr('r', d => d.r); return; }
    pageNodes
      .attr('fill-opacity', d => {
        const hit = (d.title || '').toLowerCase().includes(q) || d.preview.toLowerCase().includes(q) || d.wikiLabel.includes(q);
        return hit ? 1 : 0.06;
      })
      .attr('r', d => {
        const hit = (d.title || '').toLowerCase().includes(q) || d.preview.toLowerCase().includes(q) || d.wikiLabel.includes(q);
        return hit ? d.r * 1.8 : d.r;
      });
  });

  // ── 통계 ──
  document.getElementById('stats').textContent =
    '페이지 ' + pages.length + '개  ·  청크 ' + DATA.length + '개  ·  엣지 ' + (withinEdges.length + crossEdges.length) + '개';
  document.getElementById('subtitle').textContent =
    '페이지 단위 네트워크 · ' + pages.length + '개 페이지 · 9개 위키';
})();
</script>
</body>
</html>
