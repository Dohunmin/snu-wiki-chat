# =============================================================================
# SNU 조직 레지스트리 (college-grad-wiki feature) — 영속 누적 단일 진실원
# =============================================================================
# 이 파일은 "휘발 방지" 장치다. 한 조직을 정찰(survey)하면 결과를 여기 기록하고,
# 다시는 정찰하지 않는다. 세션이 끝나도 이 파일이 상태(state)이므로 작업은 누적된다.
#
# survey_status: pending | surveyed | adapter_built | ingested
#   surveyed 행만 검증된 진실(domain/urls/board_pattern/render 라이브 확인).
#
# ── 정찰로 확인된 어댑터 계열 (2026-06-03, 28개 전수) ──
# 단과대/대학원 사이트는 단일 CMS가 아니라 8개 엔진 계열로 분산됨:
#   snu-cms          — SNU 표준 CMS. 영문 슬러그 + 게시판 ?md=v&bbsidx={id}
#                      (변종: ?bm=v&bbsidx= — cals·nursing). static.
#   wordpress-kboard — WordPress + KBoard 플러그인. 게시글 view 형태가 사이트마다 변종:
#                      ?kboard_content_redirect= / ?mod=document&uid= / 숫자퍼머링크 /{id}/ /
#                      한글퍼머링크. static(단 gsct는 글링크 JS).
#   wordpress-custom — WordPress(비-kboard). 커스텀 taxonomy / 네이티브 퍼머링크. static.
#   egovframe        — 전자정부 표준프레임워크. *.do?nttId= . static. (medicine)
#   gnuboard         — 그누보드 PHP. /bbs/board.php?bo_table=&wr_id= . static. (law)
#   dotnet-mvc       — .NET MVC, /kr 로케일 + /Board/Detail/{type}/{id}. ⚠ board=dynamic(JS). (gspa)
#   asp-bidx         — ASP, /notice/Default.asp?bidx= . static. (gsiat)
#   path-based       — 경로기반 숫자ID 라우팅 (/boards/.../{id}/, /notice/{id}). static. (gsep·music)
#
# 핵심: Tier1/2 정적 정보페이지(인사말·연혁·비전)는 거의 전부 static SSR → cheerio로 균일 처리 가능.
#       복잡도는 Tier4 게시판 파싱에 집중됨(엔진별 상이). dynamic 렌더는 gspa·gsct 둘뿐.
#       동형 사이트는 yaml URL만 채우면 됨(O(1)). 신규 엔진만 새 어댑터 .ts 필요.
#
# parent_wiki: 단과대 → SNU_단과대_LLM_Wiki (data id: colleges)
#              대학원 → SNU_대학원_LLM_Wiki (data id: gradschools)
# 전체 정찰 raw 결과: .../tasks/wgned184r.output (조직별 상세 notes 보존)
# =============================================================================

